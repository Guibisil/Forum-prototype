<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guibs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="css/tema.css"/>
    <link rel="stylesheet" href="css/style.css"/>

</head>

<body class="d-flex flex-column min-vh-100" onload="tema(), carregar()">
    
<header class="d-flex container-fluid mb-4 mt-0 justify-content-between borda" style="border-bottom: solid 1px;">

    <article class="py-3 text-center">
        <a href="index.html" class="text-decoration-none"><h3>Guib's <i style="font-family: myFont;">Fórum</i></h3></a>
    </article>

    <section class="p-3 text-center" id="logado">
        <article class="d-flex container-fluid justify-content-between">

            <!--Temas-->
            <div>
                <button class="btn pincel py-0 mx-2" style="height: 40px;" onclick="menu_tema()"><img src="./resource/imagens/icons/pincel.png" style="height: 30px;"></button>
                <div id="menu_tema" class="d-flex align-items-center justify-content-between bg-light p-1 menu" data-aberto="false" style="border-radius: 10px; border: solid 1px black;">
                    <button class="btn btn-outline-dark btn_tema mx-1" style="background-color: #006622;"></button>
                    <button class="btn btn-outline-dark btn_tema mx-1" style="background-color: #ffffcc;"></button>
                    <button class="btn btn-outline-dark btn_tema mx-1" style="background-color: #262626;"></button>
                </div>
            </div>

            <!--Login-->
            <div>
                <button id="btn_login" class="btn btn-success" onclick="logar()">Login</button>
                <div id="menu_login" class="d-flex align-items-center justify-content-between bg-light p-1 menu_l" data-login="false" style="border-radius: 10px; border: solid 1px black;">
                    <ul class="usuario">
                        <li id="detalhes_user"><p class="text-black m-0">Detalhes</p></li>
                        <li id="deslogar_user"><p class="text-black m-0">Sair</p></li>
                    </ul>
                </div>
            </div>
        </article>
        
    </section>

</header>

<main class="flex-grow-1">

    <section class="container px-5 mb-5">

        <article class="row px-2">
            <img class="col-auto p-1" src="./resource/imagens/icons/user.png" style="height: 40px;"/>
            <p class="col-auto d-flex m-0 p-0 align-items-center" id="autor-post"></p>
        </article>

        <h2 id="titulo-post" class="mb-3">...</h2>
        <p id="conteudo-post" class="mb-4">...</p>

        <article>
            <button class="btn btn-outline-primary" id="criar_post" data-bs-toggle="modal" data-bs-target="#modal_res">
                Rsponder
            </button>
        </article>

        <article class="cointainer mt-3 px-4 borda py-2" style="border-top: solid 1px;" id="comentarios">
        </article>
    </section>

    <!--modal-->
    <div class="modal mt-5" id="modal_res">
        <div class="modal-dialog">
            <div class="modal-content">

            <div class="modal-header">
                <h4 class="modal-title text-black">Resposta</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <label for="comentario">Comentário:</label>
                <textarea class="form-control" rows="5" id="comentario" name="text" placeholder="Seu comentário..."></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-success" data-bs-dismiss="modal" id="enviar_res" onclick="enviar_resposta()">
                    Enviar
                </button>
            </div>

            </div>
        </div>
    </div>

</main>

<footer class="container-fluid d-flex justify-content-between align-items-center py-2 borda" style="border-top: solid 1px;">

    <article class="lh-1">
        <h6 class="mb-1">Guib's @ 2026</h6>
        <p class="mb-0">guibs_forum@gmail.com</p>
        <p class="mg-0">+55 (054) 99110-2112</p>
    </article>

    <article>
        <ul class="navbar-nav d-flex flex-row gap-3 pr-5" style="padding-right: 10px;"> 
            <li class="nav-item">
                <a href="https://www.instagram.com">
                    <img src="./resource/imagens/icons/instagram.png" alt="Instagram" width="30">
                </a>
            </li>
            <li class="nav-item">
                <a href="https://www.facebook.com">
                    <img src="./resource/imagens/icons/facebook.png" width="30">
                </a>
            </li>
            <li class="nav-item">
                <a href="https://www.x.com">
                    <img src="./resource/imagens/icons/twitter.png" alt="X" width="30">
                </a>
            </li>
        </ul>       
    </article>

</footer>

<script src="js/posts.js"></script>
<script src="js/tema.js"></script>
<script src="js/criar_post.js"></script>


</body>
</html>
