<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Guibs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="css/tema.css" />

</head>

<body class="d-flex flex-column min-vh-100" onload="tema(), carregar()">
    
<header class="d-flex container-fluid mb-4 mt-0 justify-content-between borda" style="border-bottom: solid 1px;">

    <article class="py-3 text-center">
        <a href="index.html" class="text-decoration-none"><h3>Guib's <i style="font-family: myFont;">Fórum</i></h3></a>
    </article>

    <section class="p-3 text-center" id="logado">
        <article class="d-flex container-fluid justify-content-between">
            <div>
                <button class="btn pincel py-0 mx-2" style="height: 40px;" onclick="menu_tema()"><img src="./resource/imagens/icons/pincel.png" style="height: 30px;"></button>
                <div id="menu_tema" class="d-flex align-items-center justify-content-between bg-light p-1 menu" data-aberto="false" style="border-radius: 10px; border: solid 1px black;">
                    <button class="btn btn-outline-dark btn_tema mx-1" style="background-color: #006622;"></button>
                    <button class="btn btn-outline-dark btn_tema mx-1" style="background-color: #ffffcc;"></button>
                    <button class="btn btn-outline-dark btn_tema mx-1" style="background-color: #262626;"></button>
                </div>
            </div>

            <button class="btn btn-success" onclick="window.location.href = 'login.html'">Login</button>

        </article>
        
    </section>

</header>

<main class="flex-grow-1">
    
<div class="row align-items-center justify-content-center" style="margin: 0px;">

        <section class="col-md-3 container border border-secondary rounded-3">

            <article class="text-center text-white p-3">
                <h4>Login</h4>
            </article>

            <article class="row justify-content-center text-center">
                
                <div class="col-sm-12 mb-3">
                    <input type="text" class="form-control w-75 mx-auto usuario" id="user" placeholder="Usuário">
                </div>
                
                <div class="col-sm-12 mb-3">
                    <input type="password" class="form-control w-75 mx-auto senha" id="senha" placeholder="Senha">
                </div>

            </article>

            <article class="text-center p-3">
                <button class="btn btn-primary" onclick="validar()">Entrar</button>
            </article>

            <article class="text-center text-danger" id="mensagem"></article>

            <hr style="color: white; width: 100%;">

            <article class="text-secondary">
                <p>Tente: teste123 / 12345</p>
            </article>
            
        </section>

</main>

<footer class="container-fluid d-flex justify-content-between align-items-center py-2 borda" style="border-top: solid 1px;">

    <article class="lh-1">
        <h6 class="mb-1">Guib's @ 2026</h6>
        <p class="mb-0">guibs_forum@gmail.com</p>
        <p class="mg-0">+55 (054) 99110-2112</p>
    </article>

    <article>
        <ul class="navbar-nav d-flex flex-row gap-3 pr-5" style="padding-right: 10px;"> 
            <li class="nav-item">
                <a href="https://www.instagram.com">
                    <img src="./resource/imagens/icons/instagram.png" alt="Instagram" width="30">
                </a>
            </li>
            <li class="nav-item">
                <a href="https://www.facebook.com">
                    <img src="./resource/imagens/icons/facebook.png" width="30">
                </a>
            </li>
            <li class="nav-item">
                <a href="https://www.x.com">
                    <img src="./resource/imagens/icons/twitter.png" alt="X" width="30">
                </a>
            </li>
        </ul>       
    </article>

</footer>

<script src="js/login.js"></script>
<script src="js/tema.js"></script>

</body>
</html>
